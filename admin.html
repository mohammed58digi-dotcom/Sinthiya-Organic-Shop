<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Sinthiya Organic Oil</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-deep: #1a3a2a; --green-mid: #2d6a4f; --cream: #f8f4ec;
      --gold: #c8933a; --text: #1c1c1c; --white: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hind Siliguri', sans-serif;
      background: var(--green-deep);
      color: var(--text);
      min-height: 100vh;
    }

    /* Login Screen */
    #login-screen {
      display: flex;
      position: fixed;
      inset: 0;
      justify-content: center;
      align-items: center;
      background: var(--green-deep);
      z-index: 1000;
    }
    .login-box {
      background: var(--white);
      padding: 40px 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .login-box h1 { color: var(--green-mid); margin-bottom: 8px; }
    .login-box input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    .login-box button {
      width: 100%;
      padding: 14px;
      background: var(--green-mid);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* Dashboard */
    #dashboard {
      display: none;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    header {
      background: var(--green-mid);
      color: white;
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .order-card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      border-right: 5px solid var(--green-mid);
    }
    .logout-btn {
      background: #e74c3c;
      padding: 8px 16px;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-box">
      <h1>🔑 অ্যাডমিন লগইন</h1>
      <p style="margin-bottom:20px; color:#555;">Sinthiya Organic Oil</p>
      
      <form id="login-form">
        <input type="text" id="username" placeholder="ইউজারনেম" required>
        <input type="password" id="password" placeholder="পাসওয়ার্ড" required>
        <button type="submit">লগইন করুন</button>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div id="dashboard">
    <header>
      <h2>🛠️ অ্যাডমিন প্যানেল - Sinthiya Organic Oil</h2>
      <button class="logout-btn" onclick="logout()">লগআউট</button>
    </header>

    <h3>সব অর্ডারসমূহ</h3>
    <div id="orders-list"></div>
  </div>

  <script>
    const ADMIN_USERNAME = "sinthiya_admin";
    const ADMIN_PASSWORD = "SinthiyaSecure@2025";

    // Login Form
    document.getElementById("login-form").addEventListener("submit", function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
        localStorage.setItem("isAdminLoggedIn", "true");
        showDashboard();
      } else {
        alert("❌ ভুল ইউজারনেম বা পাসওয়ার্ড!");
      }
    });

    function showDashboard() {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      loadOrders();
    }

    function loadOrders() {
      const orders = JSON.parse(localStorage.getItem("sinthiya_orders") || "[]");
      const container = document.getElementById("orders-list");

      if (orders.length === 0) {
        container.innerHTML = "<p style='color:white; text-align:center; padding:30px;'>এখনো কোনো অর্ডার আসেনি।</p>";
        return;
      }

      let html = "";
      orders.forEach(order => {
        html += `
          <div class="order-card">
            <strong>\( {order.name}</strong> | \){order.phone}<br>
            <small>${order.product}</small><br>
            <small>মোট: ৳\( {order.total} | \){new Date(order.time).toLocaleString('bn-BD')}</small><br>
            <small>ট্র্যাকিং: ${order.trackingCode || 'N/A'}</small>
          </div>`;
      });
      container.innerHTML = html;
    }

    function logout() {
      if (confirm("লগআউট করবেন?")) {
        localStorage.removeItem("isAdminLoggedIn");
        location.reload();
      }
    }

    // Check login status when page loads
    function checkLoginStatus() {
      if (localStorage.getItem("isAdminLoggedIn") === "true") {
        showDashboard();
      } else {
        document.getElementById("login-screen").style.display = "flex";
      }
    }

    // Initialize
    window.onload = checkLoginStatus;
  </script>
</body>
</html>
